<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }

    .image-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 15px;
    }

    /* 电脑端固定高度，手机端自动适配 */
    .img-box {
      position: relative;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 95vw;
    }
    @media (max-width: 768px) {
      .img-box {
        height: auto;
        max-height: 75vh;
      }
    }

    #displayImage {
      height: 100%;
      width: auto;
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
    }

    /* 按钮悬浮显示 */
    .nav-btn, #closeBtn {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .img-box:hover .nav-btn,
    .img-box:hover #closeBtn { opacity: 1; }

    #prevBtn { left: 15px; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; }
    #nextBtn { right: 15px; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; }
    #closeBtn { right: 15px; top: 15px; width: 40px; height: 40px; }

    /* 手机端缩小按钮 */
    @media (max-width: 768px) {
      #prevBtn, #nextBtn { width: 40px; height: 40px; }
      #closeBtn { width: 35px; height: 35px; }
    }

    #prevBtn::after { content: ''; width: 24px; height: 24px; border-left:2px solid rgb(202, 200, 200); border-bottom:2px solid rgb(202, 200, 200); transform:rotate(45deg); position:absolute; top:50%; left:50%; margin:-12px 0 0 -8px; }
    #nextBtn::after { content: ''; width: 24px; height: 24px; border-right:2px solid rgb(202, 200, 200); border-bottom:2px solid rgb(202, 200, 200); transform:rotate(-45deg); position:absolute; top:50%; left:50%; margin:-12px 0 0 -16px; }
    #closeBtn::before,#closeBtn::after { content:''; width:26px; height:2px; background:rgb(202, 200, 200); position:absolute; top:50%; left:50%; }
    #closeBtn::before { transform:translate(-50%,-50%) rotate(45deg); }
    #closeBtn::after { transform:translate(-50%,-50%) rotate(-45deg); }

    /* 左下角文字 */
    .photo-info {
      position: absolute;
      left: 20px;
      bottom: 20px;
      z-index: 5;
    }
    .photo-info h2 { font-size: 1.2em; margin-bottom: 5px; text-shadow: 0 1px 3px #000; }
    .photo-info p { font-size: 0.8em; color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px #000; }

    @media (max-width: 768px) {
      .photo-info h2 { font-size: 1em; }
      .photo-info p { font-size: 0.7em; }
    }
  </style>
</head>
<body>

  <div class="image-wrapper">
    <div class="img-box">
      <img id="displayImage">
      <button id="closeBtn"></button>
      <button class="nav-btn" id="prevBtn"></button>
      <button class="nav-btn" id="nextBtn"></button>
      <div class="photo-info">
        <h2 id="title"></h2>
        <p id="desc"></p>
      </div>
    </div>
  </div>

  <script>
    const images = JSON.parse(localStorage.getItem('multiverse_images')) || [];
    let currentIndex = Number(new URLSearchParams(location.search).get('img')) || 0;

    const img = document.getElementById('displayImage');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');

    function showImage() {
      img.src = images[currentIndex].src;
      title.innerText = images[currentIndex].title;
      desc.innerText = `IMAGE ${currentIndex + 1} / ${images.length}`;
    }

    showImage();

    document.getElementById('prevBtn').onclick = () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage();
    };

    document.getElementById('nextBtn').onclick = () => {
      currentIndex = (currentIndex + 1) % images.length;
      showImage();
    };

    document.getElementById('closeBtn').onclick = () => {
    location.href = localStorage.getItem('front_html');
    };
  </script>
</body>
</html>
