<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢乐一家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding-bottom: 80px;
    }

    /* 自适应网格：手机2列，平板3列，电脑4列 */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 768px) {
      .gallery { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1200px) {
      .gallery { grid-template-columns: repeat(4, 1fr); }
    }

    .item {
      aspect-ratio: 16/15;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }
    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: .3s;
    }
    .item:hover img { transform: scale(1.05); }
    .label {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* 固定页脚 */
    footer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 80px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }
    .home-text {
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .home-text:hover { color: #999595; }
  </style>
</head>
<body>

<div class="gallery" id="gallery"></div>

<footer>
  <a class="home-text" href="index.html">回到主页</a>
</footer>

<script>
  // 只在这里维护图片
  const IMAGES = [
    { src: "/images/huanleyijia/1.jpg", title: "西昌" },
    { src: "/images/huanleyijia/2.jpg", title: "西昌" },
    { src: "/images/huanleyijia/3.jpg", title: "西昌" },
    { src: "/images/huanleyijia/4.jpg", title: "中丝园" },
    { src: "/images/huanleyijia/5.jpg", title: "元谋" },
    { src: "/images/huanleyijia/6.jpg", title: "元谋" },
    { src: "/images/huanleyijia/7.jpg", title: "元谋" },
    { src: "/images/huanleyijia/8.jpg", title: "方山" },
    { src: "/images/huanleyijia/9.jpg", title: "方山" },
  ];

  localStorage.setItem('multiverse_images', JSON.stringify(IMAGES));
  localStorage.setItem('front_html', "huanleyijia.html");

  const gallery = document.getElementById('gallery');
  IMAGES.forEach((img, idx) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.onclick = () => location.href = `photos.html?img=${idx}`;
    div.innerHTML = `<img src="${img.src}"><div class="label">${img.title}</div>`;
    gallery.appendChild(div);
  });
</script>
</body>
</html>
